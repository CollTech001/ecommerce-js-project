<!DOCTYPE html>
<html>
  <head>
    <title>COLL Store - Orders</title>
    <link rel="shortcut icon" href="./images/mobile-logo.png" type="image/x-icon">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- CSS files -->
    <link rel="stylesheet" href="styles/shared/general.css">
    <link rel="stylesheet" href="styles/shared/header.css">
    <link rel="stylesheet" href="styles/pages/orders.css">
  </head>
  <body>
    <!-- Modern Header -->
    <div class="header">
      <div class="header-left-section">
        <a href="index.html" class="header-link">
          <img class="logo" src="images/logo-white.png" alt="COLL">
          <img class="mobile-logo" src="images/mobile-logo-white.png" alt="COLL">
        </a>
      </div>

      <div class="header-middle-section">
        <input class="search-bar" type="text" placeholder="Search your orders or products...">
        <button class="search-button">
          <img class="search-icon" src="images/icons/search-icon.png">
        </button>
      </div>

      <div class="header-right-section">
        <a class="orders-link header-link" href="orders.html">
          <span class="returns-text">Support</span>
          <span class="orders-text">Orders</span>
        </a>

        <a class="cart-link header-link" href="checkout.html">
          <img class="cart-icon" src="images/icons/cart-icon.png">
          <div class="cart-quantity js-cart-quantity"></div>
          <div class="cart-text">Cart</div>
        </a>
      </div>
    </div>

    <div class="main">
      <div class="page-title">Your Orders</div>

      <div class="orders-grid js-orders-grid">
        <!-- Orders populated by JavaScript -->
      </div>
    </div>

    <script type="module" src="./scripts/orders.js"></script>
  </body>
</html>
