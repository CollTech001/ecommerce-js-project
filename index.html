<!DOCTYPE html>
<html>
  <head>
    <title>COLL Store</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="shortcut icon" href="./images/logo_blue.jpg" type="image/x-icon">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="shortcut icon" href="./images/mobile-logo-white.png" type="image/x-icon">

    <!-- CSS files -->
    <link rel="stylesheet" href="styles/shared/general.css">
    <link rel="stylesheet" href="styles/shared/header.css">
    <link rel="stylesheet" href="styles/pages/home.css">
  </head>
  <body>
    <!-- Modern Header -->
    <div class="header">
      <div class="header-left-section">
        <a href="index.html" class="header-link">
          <img class="logo" src="images/logo-white.png" alt="COLL">
          <img class="mobile-logo" src="images/mobile-logo.png" alt="COLL">
        </a>
      </div>

      <div class="header-middle-section">
        <input class="search-bar" type="text" placeholder="Search premium products...">
        <button class="search-button">
          <img class="search-icon" src="images/icons/search-icon.png">
        </button>
      </div>

      <div class="header-right-section">
        <a class="orders-link header-link" href="orders.html">
          <span class="returns-text">Support</span>
          <span class="orders-text">Orders</span>
        </a>

        <a class="cart-link header-link" href="checkout.html">
          <img class="cart-icon" src="images/icons/cart-icon.png">
          <div class="cart-quantity js-cart-quantity">0</div>
          <div class="cart-text">Cart</div>
        </a>
      </div>
    </div>

    <!-- Hero Banner - New addition for modern feel -->
    <div class="hero-banner">
      <div class="hero-content">
        <h1>Discover Premium Tech & Lifestyle</h1>
        <p>Curated selection of high-quality products with fast delivery</p>
        <a href="#products" class="shop-now-btn">Shop Now</a>
      </div>
    </div>

    <!-- Main Content -->
    <div class="main" id="products">
      <div class="section-header">
        <h2>Featured Products</h2>
      </div>
      
      <div class="products-grid js-products-grid">
        <!-- Products populated by JavaScript -->
      </div>
    </div>

    <script type="module" src="./scripts/home.js"></script>
  </body>
</html>
